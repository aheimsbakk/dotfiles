# --- Fonts ---
# Linux: sudo apt install fonts-cascadia-code
# macOS: brew install --cask font-cascadia-code
font_size        12.0
adjust_line_height 120%

# --- Background Opacity ---
# Set your default starting opacity (e.g., 90% solid)
background_opacity 0.95

# Allow opacity to be changed at runtime
dynamic_background_opacity yes

# --- Window & Behavior ---
# Set to 'no' to force Kitty to use the initial dimensions below
remember_window_size    no
# The 'c' suffix ensures these are treated as character cells, not pixels
initial_window_width    120c
initial_window_height   24c
# Reduced inner padding from 10 to a much tighter 4
window_padding_width    4
confirm_os_window_close 0
close_on_child_death yes

# --- macOS Specific Settings ---
# Force the Mac 'Option' key to act as 'Alt' for your window resizing/navigation
macos_option_as_alt yes
# Native Mac behavior: completely quit Kitty when the last window is closed
macos_quit_when_last_window_closed yes
# Ensures the Mac titlebar matches the terminal background perfectly
# macos_titlebar_color system

# --- Window Borders (For Mouse Resizing) ---
# Make the split lines thick enough to easily grab with the mouse
window_border_width 1pt

# (Optional) Add a tiny gap between the windows for extra clarity
window_margin_width 0

# --- GNOME/Wayland Integration ---
linux_display_server    wayland
# Tells Kitty to match the titlebar color to your system theme
# wayland_titlebar_color  system

# --- Cursor Style & Trail ---
# cursor                     #526fff
# cursor_text_color          #ffffff
cursor_shape               block
cursor_blink_interval      0
cursor_stop_blinking_after 0
shell_integration          no-cursor

# Smooth Cursor Trail (Ghosting)
cursor_trail                 3
cursor_trail_decay           0.1 0.4
cursor_trail_start_threshold 2

# --- Layouts ---
enabled_layouts tall,fat,grid,horizontal,vertical,stack

# --- Tab Bar ---
tab_bar_style           powerline
active_tab_font_style   bold

# --- KEYBINDINGS (Universal Cross-Platform) ---

# Splitting Screens
# Using Alt+D for splits is very common in Linux tiling setups
#map alt+d launch --location=vsplit --cwd=current
#map alt+shift+d launch --location=hsplit --cwd=current

# Navigating Splits (Using Alt/Option + Arrows)
map alt+left  neighboring_window left
map alt+right neighboring_window right
map alt+up    neighboring_window up
map alt+down  neighboring_window down

# Managing Layouts
#map alt+l next_layout
map alt+z toggle_layout stack

# Resizing Splits (Alt/Option + Shift + Arrows)
map alt+shift+left  resize_window narrower 3
map alt+shift+right resize_window wider 3
map alt+shift+up    resize_window taller 3
map alt+shift+down  resize_window shorter 3

# Tab Management (Linux Style)
map ctrl+shift+t new_tab_with_cwd
map ctrl+shift+w close_window

# Tab Management (macOS Native Style)
map cmd+t new_tab_with_cwd
map cmd+w close_window

# Reload config (Linux & macOS friendly)
map ctrl+shift+f5 load_config_file
map cmd+ctrl+, load_config_file

# Switch to Dark Mode
map ctrl+alt+d kitten themes --reload-in=all "Gnome-ish gray-on-black"
map cmd+opt+d kitten themes --reload-in=all "Gnome-ish gray-on-black"

# Switch to Light Mode
map ctrl+alt+l kitten themes --reload-in=all "Gnome Light"
map cmd+opt+l kitten themes --reload-in=all "Gnome Light"

# Press F12 to open the theme switcher overlay
map ctrl+shift+f12 launch --type=overlay kitten themes
map cmd+shift+f12 launch --type=overlay kitten themes

# BEGIN_KITTY_FONTS
font_family      family='Cascadia Code' variable_name=CascadiaCodeRoman style=Regular
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS

# BEGIN_KITTY_THEME
# Gnome Light
include current-theme.conf
# END_KITTY_THEME
