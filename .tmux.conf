# ==========================================
# Kitty + Vim Synergy Settings
# ==========================================

# Tmux waits ~500ms after pressing Escape to see if it's part of a sequence.
# This makes Vim feel incredibly sluggish. Setting it to 10ms fixes it.
set -sg escape-time 10

# Tells Tmux to pass Kitty's True Color through to Vim (fixes washed-out Vim themes)
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-kitty:RGB"

# Lets Vim know when you click back into the terminal so it can auto-update 
# things like GitGutter and autoread files changed outside of Vim.
set -g focus-events on

# Use Vim keybindings to navigate around in Tmux's scrollback buffer
setw -g mode-keys vi

# Start counting windows at 1 instead of 0. Reaching for 'Prefix + 1' is much easier.
set -g base-index 1
setw -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# ==========================================
# Core Behavior (Your settings)
# ==========================================

set -g mouse on
set -g update-environment "DISPLAY SSH_CONNECTION SSH_CLIENT SSH_TTY"
set-environment -g "SSH_AUTH_SOCK" $HOME/.ssh/ssh_auth_sock

# Toggle pane synchronization (Note: Ctrl+S sometimes conflicts with bash XOFF, 
# you can press Ctrl+Q to unfreeze the terminal if that happens)
bind -n C-s set-window-option synchronize-panes

# Use 'v' to start selection instead of Space
bind -T copy-mode-vi v send-keys -X begin-selection

# Use 'y' to yank (copy) instead of Enter
bind -T copy-mode-vi y send-keys -X copy-selection

# Use 'Escape' to cancel selection/exit Copy Mode
bind -T copy-mode-vi Escape send-keys -X cancel

# ==========================================
# Minimal Universal Theme (Light/Dark Mode)
# ==========================================

# The trick to making a status bar work in both light and dark mode is setting 
# the background to 'default'. This makes it transparent, allowing Kitty's 
# auto-switching background to show through naturally.
# colour245 is a mid-tone slate gray that contrasts nicely against both white and black.
set -g status-style bg=default,fg=colour245

# Clean, distraction-free left/right segments
set -g status-left " #[fg=colour245,bold]#S "
set -g status-right "%Y-%m-%d %H:%M "

# Active window formatting (Slightly brighter text, bracketed)
set -g window-status-current-style bg=default,fg=colour250,bold
set -g window-status-current-format " [#I: #W] "

# Inactive window formatting (Dimmer text)
set -g window-status-format "  #I: #W  "

# Pane border styling (Matches Kitty's border style)
set -g pane-border-style fg=colour240
set -g pane-active-border-style fg=colour245
